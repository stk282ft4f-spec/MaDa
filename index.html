<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaDa ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ========================= -->
    <!-- PANTALLA DE BIENVENIDA -->
    <!-- ========================= -->

    <section id="bienvenida">

        <div id="araña">

            <div id="hilo"></div>

            <div id="cuerpoAraña">
                🕷️
            </div>

            <div id="cartelDavid">
                David
            </div>

        </div>

        <div class="contenidoBienvenida">

            <h1>Bienvenido</h1>

            <p>
                Tengo una pequeña sorpresa para ti...
            </p>

            <button id="btnEntrar">
                Entrar ❤️
            </button>

        </div>

    </section>



    <!-- ========================= -->
    <!-- PÁGINA PRINCIPAL -->
    <!-- ========================= -->

    <main id="paginaPrincipal">

        <h1 class="titulo">
            MaDa
        </h1>



        <!-- Corazones flotando -->

        <div id="corazones"></div>



        <!-- ========================= -->
        <!-- ILUSTRACIÓN -->
        <!-- ========================= -->

        <section class="bloque">

            <button id="abrirIlustracion">

                Ábreme ❤️

            </button>

            <div id="contenedorIlustracion">

                <!-- CAMBIA ESTA IMAGEN POR TU ILUSTRACIÓN -->

                <img
                    src="images/ilustracion.png"
                    alt="Ilustración">

            </div>

        </section>



        <!-- ========================= -->
        <!-- CARTA -->
        <!-- ========================= -->

        <section class="bloque">

            <button id="abrirCarta">

                Ábreme 💌

            </button>

            <div id="carta">

                <h2> muaaak!!❤️</h2>

                <p>

			                   miss u 😭🩷

                </p>

            </div>

        </section>



        <!-- ========================= -->
        <!-- MÚSICA -->
        <!-- ========================= -->

        <audio
            id="musica"
            loop>

            <source
                src="audio/piano.mp3"
                type="audio/mpeg">

        </audio>

        <button id="musicaBtn">

            🎵 Música

        </button>

    </main>



    <script src="script.js"></script>

</body>

</html>
